<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBS Upload Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .drag-active { border-color: #4f46e5; background-color: #eef2ff; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>

<body class="text-slate-800 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-indigo-600 text-white shadow-md z-10 relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">Essent SBS Portal</h1>
        </div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        <!-- Upload Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-10">
            <h2 class="text-lg font-bold text-slate-800 mb-2">Upload Sitecore Media Package</h2>
            <p class="text-sm text-slate-500 mb-6">Upload a Sitecore ZIP package to extract and analyze banner data.</p>
            
            <div id="dropzone" class="border-2 border-dashed border-slate-300 rounded-xl p-10 flex flex-col items-center justify-center transition-colors cursor-pointer hover:bg-slate-50 group">
                <svg class="w-12 h-12 text-indigo-400 group-hover:text-indigo-500 mb-4 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <p class="font-medium text-slate-700">Click to browse or drag and drop a ZIP file here</p>
                <p class="text-xs text-slate-400 mt-2">Maximum file size: 50MB</p>
                <input type="file" id="fileInput" class="hidden" accept=".zip" />
            </div>

            <!-- Upload Progress UI (Hidden by default) -->
            <div id="progressContainer" class="hidden mt-6 bg-slate-50 p-4 rounded-lg border border-slate-100">
                <div class="flex justify-between text-sm mb-2 text-slate-600 font-medium">
                    <span id="progressText">Uploading...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progressBar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Error Alert -->
            <div id="errorAlert" class="hidden mt-4 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded relative text-sm">
                <strong class="font-bold">Error!</strong>
                <span id="errorMessage" class="block sm:inline">Something went wrong.</span>
            </div>
        </div>

        <!-- Archives Section -->
        <div>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xl font-bold text-slate-800">Previous Uploads</h2>
                <button id="refreshBtn" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refresh
                </button>
            </div>
            <div id="archivesList" class="flex flex-col gap-4">
                <!-- Archive cards injected here by JS -->
                <div class="text-center py-10 text-slate-400 text-sm italic">Loading...</div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
